// Message format for the MojoLPM fuzzer for
// EdgeSyncConfirmationDialogPageHandlerFactory interface in
// edge_sync_confirmation_dialog.mojom

syntax = "proto2";

package chrome.fuzzing.edge_sync_confirmation_dialog.proto;

import "chrome/browser/ui/webui/edge_sync_confirmation_dialog/edge_sync_confirmation_dialog.mojom.mojolpm.proto";

message NewEdgeSyncConfirmationDialogPageHandlerFactoryAction {
  required uint32 id = 1;
}

// Run the specific sequence for (an indeterminate) period. This is not
// intended to create a specific ordering, but to allow the fuzzer to delay a
// later task until previous tasks have completed.
message RunThreadAction {
  enum ThreadId {
    IO = 0;
    UI = 1;
  }

  required ThreadId id = 1;
}

// Actions that can be performed by the fuzzer.
message Action {
  oneof action {
    RunThreadAction run_thread = 1;

    NewEdgeSyncConfirmationDialogPageHandlerFactoryAction
        new_edge_sync_confirmation_dialog_page_handler_factory = 2;
    mojolpm.edge_sync_confirmation_dialog.mojom
        .EdgeSyncConfirmationDialogPageHandlerFactory.RemoteAction
            edge_sync_confirmation_dialog_page_handler_factory_remote_action =
        3;

    mojolpm.edge_sync_confirmation_dialog.mojom
        .EdgeSyncConfirmationDialogPageHandler.RemoteAction
            edge_sync_confirmation_dialog_page_handler_remote_action = 4;
  }
}

// Sequence provides a level of indirection which allows Testcase to compactly
// express repeated sequences of actions.
message Sequence {
  repeated uint32 action_indexes = 1 [packed = true];
}

// Testcase is the top-level message type interpreted by the fuzzer.
message Testcase {
  repeated Action actions = 1;
  repeated Sequence sequences = 2;
  repeated uint32 sequence_indexes = 3 [packed = true];
}
