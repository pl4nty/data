//
// Wire contract for the named-pipe IPC bridge between
// mscopilotundockedhost.exe (the host, pipe SERVER) and copilotapp.exe
// (the browser, pipe CLIENT).
//
// TODO(https://task.ms/62479593): drop this in-tree copy of the schema once
// the canonical .proto can be consumed from the edge.undockedcopilot repo
// via DEPS / CIPD.
//
// Source of truth lives in
//   edge.undockedcopilot/win/apps/host/Undocked.BrowserBridge/Schema/
// and is hand-copied (no symlink) into the chromium.src tree. Until cipd
// integration is done.
//
// COMPATIBILITY RULES (read before changing):
//   - Field tags are STABLE FOR LIFE. Never reuse a number. Never remove.
//     Mark deprecated fields with `[deprecated = true]`.
//   - When removing a field, also add `reserved <tag>;` and
//     `reserved "<name>";` to the enclosing message/enum so the proto
//     compiler refuses any future reuse of that tag or name.
//   - Add new RPCs by adding new variants to RequestPayload / ResponsePayload.
//     Older peers that don't know the variant must return UNSUPPORTED_METHOD
//     in the generic envelope error, not close the pipe.
//   - Proto3 unknown-field preservation gives us forward compat for free
//     on field additions; rely on it.
//
// FRAMING (described alongside the framing implementation, not here):
//   On the wire: [uint32 LE length][serialized Envelope bytes]. Length excludes
//   itself. Max frame = 1 MiB; either side disconnects on oversize.

syntax = "proto3";

package edge.copilot.undocked.pipe.v1;

option csharp_namespace = "Undocked.BrowserBridge.Schema";

// Chrome links protobuf_lite into msedge.dll. LITE_RUNTIME generates code
// that depends only on MessageLite and avoids the descriptor/reflection
// machinery. Our wire surface (oneof + Parse/Serialize + unknown-field
// preservation) is fully supported by lite. The C# generator ignores this
// option (Google.Protobuf has a single runtime).
option optimize_for = LITE_RUNTIME;

// ---------------------------------------------------------------------------
// Envelope - the only top-level message on the wire.
// ---------------------------------------------------------------------------

message Envelope {
  // ---- Header / metadata (stamped on every envelope) ----

  // Per-connection request id, generated by the requester and echoed
  // verbatim in the corresponding Response. The high bit (1 << 63) encodes
  // the originator:
  //   0 = host-originated request
  //   1 = browser-originated request
  // The low 63 bits are a monotonically increasing per-connection counter
  // that starts at 1, so request_id == 0 is never a correlation id and is
  // reserved for unsolicited notifications (none defined today).
  fixed64 request_id = 1;

  // Opaque per-connection session id, minted once by the pipe server (the
  // host) at connection accept and stamped on every Envelope on this
  // connection. The connection is bidirectional, so either peer may
  // originate Requests; both stamp and echo this id verbatim so logs from
  // either side scope to the same session. Distinct from request_id, which
  // correlates one request/response pair within a connection. 0 means
  // "session not set". Fixed-width: the value is uniformly random,
  // so varint would always cost the max
  // width anyway.
  fixed64 session_id = 2;

  // W3C trace-context propagation for the user action that produced this
  // envelope. The bridge does not interpret the bytes; it only forwards
  // them. Both fields are stamped by the originator when present and echoed
  // verbatim by the responder onto the matching Response, so both peers'
  // spans attach to the same distributed trace. parent_span_id is the
  // originator's span id, letting the responder open a properly linked
  // child span. Lengths are fixed; a peer MUST reject any other length as a
  // malformed request (STATUS_MALFORMED_REQUEST).
  bytes trace_id = 3;        // 16 bytes, or empty == absent
  bytes parent_span_id = 4;  // 8 bytes, or empty == absent

  // Wall-clock time the originator constructed this envelope, as Unix
  // epoch MILLISECONDS in UTC. Stamped per-frame: a Response's timestamp
  // is when the responder built the reply, NOT echoed from the matching
  // Request, so response.timestamp - request.timestamp ≈ handler + wire
  // round-trip. This delta is valid only on a same-machine pipe (clock
  // skew ~0); do not use it to measure RTT off-box. 0 means "timestamp not
  // set" (older peer). Fixed-width for the same reason session_id is.
  fixed64 timestamp = 5;

  // ---- Payload ----

  oneof kind {
    Request request = 6;
    Response response = 7;
  }
}

// ---------------------------------------------------------------------------
// Requests
// ---------------------------------------------------------------------------

message Request {
  // Scenario-defined hierarchical routing key, opaque to the bridge.
  // Used by the receiving peer to dispatch the request to one
  // registered handler (and any registered observers); see
  // pipe_bridge_dispatcher.h on the browser side.
  //
  // Format (recommended, matches Windows-pipe / TFS area-path style):
  //   "\Top\Sub\Leaf\"  -- segments separated and bracketed by '\'.
  //   "\"               -- root; matches everything.
  // Forward slash '/' is also accepted and normalized to '\' on the
  // receiving side, but '\' is the canonical form and what scenarios
  // SHOULD stamp.
  //
  // Matching is "starts-with" on normalized strings: a handler
  // registered at "\UniversalComposer\" matches incoming area_paths
  // "\UniversalComposer\", "\UniversalComposer\SubmitQuery\", and
  // "\UniversalComposer\SubmitQueryWithFiles\", but not
  // "\UniversalComposerOther\".
  //
  // Empty string is treated as the root "\" by the receiver. Older
  // peers that do not stamp this field therefore route to a root
  // handler if one is registered, else get STATUS_UNSUPPORTED_METHOD
  // back. The dispatcher is intentionally scenario-agnostic; there is
  // no per-payload-kind fallback.
  string area_path = 100;

  oneof payload {
    NavigateToConversationRequest navigate_to_conversation = 1;
    SubmitChatQueryRequest submit_chat_query = 2;
    PingFromBrowserRequest ping_from_browser = 3;
    // New RPCs: append a new tag here. NEVER reuse an old tag.
  }
}

message NavigateToConversationRequest {
  string conversation_id = 1;
}

message SubmitChatQueryRequest {
  // Non-empty, max 4096 chars (server-side enforced; client should pre-check).
  string query = 1;
}

// ---------------------------------------------------------------------------
// Responses
// ---------------------------------------------------------------------------

// Generic envelope-level outcome. STATUS_OK means the dispatcher accepted
// and ran the request; non-OK means it rejected the envelope before any
// handler ran. Per-RPC business errors are reported in the typed payload
// below, never here.
enum Status {
  STATUS_OK = 0;
  // The request variant is not recognised by this peer.
  STATUS_UNSUPPORTED_METHOD = 1;
  // The request payload failed to decode or violated a basic invariant
  // (e.g. empty oneof). Suggests schema drift; the pipe stays open.
  STATUS_MALFORMED_REQUEST = 2;
  // The handler threw / crashed on the server side. Detail is not wire-
  // transmitted by design (no PII leakage).
  STATUS_INTERNAL_ERROR = 3;
}

message Response {
  Status status = 1;

  // Optional short, non-PII diagnostic string. Bounded to 256 chars on send.
  string status_detail = 2;

  // Present iff status == STATUS_OK.
  oneof payload {
    NavigateToConversationResponse navigate_to_conversation = 3;
    SubmitChatQueryResponse submit_chat_query = 4;
    PingFromBrowserResponse ping_from_browser = 5;
  }
}

// Mirrors mojom NavigateToConversationErrorCode. Values are stable.
enum NavigateToConversationError {
  NAVIGATE_UNSPECIFIED = 0;
  NAVIGATE_INVALID_INPUT = 1;
  NAVIGATE_NO_COPILOT_WINDOW = 2;
  NAVIGATE_INTERNAL_ERROR = 3;
  NAVIGATE_FEATURE_DISABLED = 4;
}

message NavigateToConversationResponse {
  NavigateToConversationError error = 1;
}

// Mirrors mojom SubmitChatQueryErrorCode. Values are stable.
enum SubmitChatQueryError {
  SUBMIT_UNSPECIFIED = 0;
  SUBMIT_UNKNOWN_ERROR = 1;
  SUBMIT_INVALID_INPUT = 2;
  SUBMIT_NO_COPILOT_WINDOW = 3;
  SUBMIT_CANCELLED = 4;
}

message SubmitChatQueryResponse {
  SubmitChatQueryError error = 1;
}

// ---------------------------------------------------------------------------
// Browser-originated keep-alive ping.
// ---------------------------------------------------------------------------
//
// TODO(https://task.ms/62479304) : remove PingFromBrowser{Request,Response}
// once a real browser->host RPC is defined. This message exists only as a
// placeholder to prove the copilotapp.exe -> mscopilotundockedhost.exe
// direction works end-to-end.

message PingFromBrowserRequest {
  // Opaque, browser-chosen string (random in the POC). Bounded to 256 chars
  // by the sender; the host echoes whatever it receives.
  string nonce = 1;
}

message PingFromBrowserResponse {
  // Echo of the request nonce.
  string nonce = 1;
}
